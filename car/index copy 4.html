<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>차량 운행 입력</title>
</head>
<body>

<h2>차량 운행 입력</h2>

<form id="form">
  <label>구분</label><br>
  <select id="type">
    <option value="start">출발</option>
    <option value="end">도착</option>
  </select><br><br>

  <label>운행자</label><br>
  <input type="text" id="driver"><br><br>

  <label>목적지</label><br>
  <input type="text" id="destination"><br><br>

  <label>운행목적</label><br>
  <input type="text" id="purpose"><br><br>

  <label>계기판 km</label><br>
  <input type="number" id="km"><br><br>

  <label>주유량</label><br>
  <input type="number" id="fuel"><br><br>

  <label>주유금액</label><br>
  <input type="number" id="cost"><br><br>

  <button type="submit">저장</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://drbvrvftwryrglradshz.supabase.co";
const supabaseKey = "sb_publishable_hcsEKwfcnGHoWIOOAKarvA_G9xB3-Lc";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let lastStartData = null;

// 🔥 최근 출발 데이터 가져오기
async function getLastStart() {
    const { data } = await client
        .from('car_log')
        .select('*')
        .order('id', { ascending: false })
        .limit(1);

    lastStartData = (data && data.length > 0) ? data[0] : null;
}

// 🔥 구분 변경 시 자동 세팅
document.getElementById("type").addEventListener("change", async function() {

    if (this.value === "end") {
        await getLastStart();

        if (lastStartData) {
            document.getElementById("driver").value = lastStartData.driver || "";
            document.getElementById("destination").value = lastStartData.destination || "";
            document.getElementById("purpose").value = lastStartData.purpose || "";
        }
    } else {
        document.getElementById("form").reset();
    }
});

document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const type = document.getElementById("type").value;
    const driver = document.getElementById("driver").value;
    const destination = document.getElementById("destination").value;
    const purpose = document.getElementById("purpose").value;

    const km = document.getElementById("km").value ? Number(document.getElementById("km").value) : null;
    const fuel = document.getElementById("fuel").value ? Number(document.getElementById("fuel").value) : null;
    const cost = document.getElementById("cost").value ? Number(document.getElementById("cost").value) : null;

    const now = new Date().toISOString();

    try {

        // 🔥 미완료 출발 찾기
        const { data: lastRow } = await client
            .from('car_log')
            .select('*')
            .is('end_km', null)
            .order('id', { ascending: false })
            .limit(1);

        const last = (lastRow && lastRow.length > 0) ? lastRow[0] : null;

        // =========================
        // 🚗 출발
        // =========================
        if (type === "start") {

            await client
                .from('car_log')
                .insert([{
                    date: new Date().toISOString().split('T')[0],
                    driver,
                    destination,
                    purpose,
                    start_km: km,
                    start_time: now,
                    fuel,
                    cost
                }]);
        }

        // =========================
        // 🚗 도착
        // =========================
        if (type === "end") {

            if (!last) {
                alert("출발 기록이 없습니다.");
                return;
            }

            if (km === null) {
                alert("도착 km 입력 필요");
                return;
            }

            const distance = km - last.start_km;

            if (distance < 0) {
                alert("계기판 값 오류");
                return;
            }

            await client
                .from('car_log')
                .update({
                    driver,
                    destination,
                    purpose,
                    end_km: km,
                    end_time: now,
                    distance: distance,
                    fuel,
                    cost
                })
                .eq('id', last.id);
        }

        alert("저장 완료");
        document.getElementById("form").reset();

    } catch (err) {
        console.log(err);
        alert("오류 발생");
    }
});
</script>

</body>
</html>
