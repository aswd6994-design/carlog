<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>(주)NK 차량 운행 시스템</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f5f6f8;
  margin: 0;
  padding: 16px;
}

/* 헤더 */
.header {
  text-align: center;
  margin-bottom: 16px;
}

.logo {
  width: 180px;
  opacity: 0.9;
}

h2 {
  font-size: 18px;
  font-weight: 500;
  color: #444;
  margin: 6px 0 0;
}

/* 카드 */
.card {
  background: white;
  width: 100%;
  max-width: 420px;
  margin: auto;
  padding: 18px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

/* 버튼 영역 */
.mode-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fafafa;
  cursor: pointer;
  font-size: 14px;
}

.mode-btn.active {
  background: #4a90e2;
  color: white;
  border: none;
}

/* 라벨 */
label {
  font-size: 13px;
  color: #666;
}

/* 입력 */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 10px;
  border: 1px solid #e5e5e5;
  background: #fafafa;
  font-size: 16px; /* 🔥 모바일 핵심 (자동 확대 방지) */
}

input:focus {
  background: white;
  border-color: #4a90e2;
  outline: none;
}

/* 버튼 */
button.save {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #4a90e2;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* 🔥 모바일 최적화 */
@media (max-width: 600px) {

  html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

  body {
  background: #f5f6f8;
}


  * {
  box-sizing: border-box;
}
  .card {
  width: calc(100% - 24px);
  max-width: 420px;
  margin: 12px auto;
  padding: 16px;
  border-radius: 16px;
}

  h2 {
    font-size: 17px;
  }

  .mode-btn {
    font-size: 13px;
    padding: 12px;
  }

  button.save {
    padding: 16px;
  }

  img, input, button {
  max-width: 100%;
}
}
</style>

</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h2>차량 운행 시스템</h2>
</div>

<div class="card">

  <!-- 버튼 -->
  <div class="mode-buttons">
    <button type="button" id="startBtn" class="mode-btn active">출발</button>
    <button type="button" id="endBtn" class="mode-btn">도착</button>
  </div>

  <form id="form">

    <label>운행자</label>
    <input type="text" id="driver">

    <label>목적지</label>
    <input type="text" id="destination">

    <label>운행목적</label>
    <input type="text" id="purpose">

    <label>계기판 km</label>
    <input type="number" id="km">

    <label>주유량</label>
    <input type="number" id="fuel">

    <label>주유금액</label>
    <input type="number" id="cost">

    <button class="save" type="submit">저장</button>

  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://drbvrvftwryrglradshz.supabase.co";
const supabaseKey = "sb_publishable_hcsEKwfcnGHoWIOOAKarvA_G9xB3-Lc";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let mode = "start";
let lastData = null;

const startBtn = document.getElementById("startBtn");
const endBtn = document.getElementById("endBtn");

startBtn.onclick = () => {
  mode = "start";
  startBtn.classList.add("active");
  endBtn.classList.remove("active");
  document.getElementById("form").reset();
};

endBtn.onclick = async () => {
  mode = "end";
  endBtn.classList.add("active");
  startBtn.classList.remove("active");

  const { data } = await client
    .from('car_log')
    .select('*')
    .is('end_km', null)
    .order('id', { ascending: false })
    .limit(1);

  lastData = data?.[0] || null;

  if (lastData) {
    document.getElementById("driver").value = lastData.driver || "";
    document.getElementById("destination").value = lastData.destination || "";
    document.getElementById("purpose").value = lastData.purpose || "";
  }
};

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const driver = document.getElementById("driver").value;
  const destination = document.getElementById("destination").value;
  const purpose = document.getElementById("purpose").value;

  const km = Number(document.getElementById("km").value);
  const fuel = Number(document.getElementById("fuel").value);
  const cost = Number(document.getElementById("cost").value);

  const now = new Date().toISOString();

  if (mode === "start") {

    await client.from('car_log').insert([{
      date: new Date().toISOString().split('T')[0],
      driver,
      destination,
      purpose,
      start_km: km,
      start_time: now,
      fuel,
      cost
    }]);

    alert("출발 등록 완료");
    document.getElementById("form").reset();
  }

  if (mode === "end") {

    if (!lastData) {
      alert("출발 데이터 없음");
      return;
    }

    const distance = km - lastData.start_km;

    if (distance < 0) {
      alert("계기판 값 오류");
      return;
    }

    await client.from('car_log')
      .update({
        driver,
        destination,
        purpose,
        end_km: km,
        end_time: now,
        distance
      })
      .eq('id', lastData.id);

    alert("도착 등록 완료");
    document.getElementById("form").reset();
  }
});
</script>

</body>
</html>
