<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>(주)NK 차량 운행 시스템</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: #f5f6f8;
  font-family: -apple-system, sans-serif;
}

/* 헤더 */
.header {
  text-align: center;
  padding: 16px 12px 8px;
}

.logo {
  width: 160px;
  max-width: 80%;
}

/* 카드 */
.card {
  background: white;
  width: calc(100% - 24px);
  max-width: 420px;
  margin: 10px auto 30px;
  padding: 16px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

/* 버튼 */
.mode-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.mode-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fafafa;
  font-size: 14px;
}

.mode-btn.active {
  background: #4a90e2;
  color: white;
  border: none;
}

/* input */
label {
  font-size: 13px;
  color: #666;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 10px;
  border: 1px solid #e5e5e5;
  background: #fafafa;
  font-size: 16px;
}

input:focus {
  background: #fff;
  border-color: #4a90e2;
  outline: none;
}

/* 저장 */
button.save {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #4a90e2;
  color: white;
  font-size: 16px;
}

/* 모바일 */
@media (max-width: 600px) {
  .card {
    width: calc(100% - 16px);
    padding: 14px;
  }

  .mode-btn {
    font-size: 13px;
  }
}
</style>

</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
    <h2>(주)엔케이 차량 운행 시스템</h2>
</div>

<div class="card">

  <div class="mode-buttons">
    <button type="button" id="startBtn" class="mode-btn active">출발</button>
    <button type="button" id="endBtn" class="mode-btn">도착</button>
  </div>

  <form id="form">

    <label>운행자</label>
    <input type="text" id="driver">

    <label>목적지</label>
    <input type="text" id="destination">

    <label>운행목적</label>
    <input type="text" id="purpose">

    <label>계기판(km)</label>
    <input type="number" id="km">

    <label>주유량(ℓ)</label>
    <input type="number" id="fuel">

    <label>주유금액(원)</label>
    <input type="number" id="cost">

    <button class="save" type="submit">저장</button>

  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseUrl = "https://drbvrvftwryrglradshz.supabase.co";
const supabaseKey = "sb_publishable_hcsEKwfcnGHoWIOOAKarvA_G9xB3-Lc";
const client = createClient(supabaseUrl, supabaseKey);

let mode = "start";
let lastData = null;

const startBtn = document.getElementById("startBtn");
const endBtn = document.getElementById("endBtn");

startBtn.onclick = () => {
  mode = "start";
  startBtn.classList.add("active");
  endBtn.classList.remove("active");
  document.getElementById("form").reset();
};

endBtn.onclick = async () => {
  mode = "end";
  endBtn.classList.add("active");
  startBtn.classList.remove("active");

  try {
    const { data, error } = await client
      .from('car_log')
      .select('*')
      .is('end_km', null)
      .order('id', { ascending: false })
      .limit(1);

    if (error) throw error;

    lastData = data?.[0] || null;

    if (lastData) {
      document.getElementById("driver").value = lastData.driver || "";
      document.getElementById("destination").value = lastData.destination || "";
      document.getElementById("purpose").value = lastData.purpose || "";
    }

  } catch (err) {
    alert("데이터 조회 실패");
    console.error(err);
  }
};

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const driver = document.getElementById("driver").value;
  const destination = document.getElementById("destination").value;
  const purpose = document.getElementById("purpose").value;

  const km = Number(document.getElementById("km").value || 0);
  const fuel = Number(document.getElementById("fuel").value || 0);
  const cost = Number(document.getElementById("cost").value || 0);

  const now = new Date().toISOString();

  try {

    if (mode === "start") {

      const { error } = await client.from('car_log').insert([{
        date: new Date().toISOString().split('T')[0],
        driver,
        destination,
        purpose,
        start_km: km,
        start_time: now,
        fuel,
        cost
      }]);

      if (error) throw error;

      alert("출발 등록 완료");
      document.getElementById("form").reset();
    }

    if (mode === "end") {

      if (!lastData) {
        alert("출발 데이터 없음");
        return;
      }

      const distance = km - lastData.start_km;

      if (distance < 0) {
        alert("계기판 값 오류");
        return;
      }

      const { error } = await client
        .from('car_log')
        .update({
          driver,
          destination,
          purpose,
          end_km: km,
          end_time: now,
          distance
        })
        .eq('id', lastData.id);

      if (error) throw error;

      alert("도착 등록 완료");
      document.getElementById("form").reset();
    }

  } catch (err) {
    console.error(err);
    alert("저장 실패");
  }
});
</script>

</body>
</html>
