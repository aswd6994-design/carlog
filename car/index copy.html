<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>차량 운행 입력</title>

  <style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f7f8fa;
  margin: 0;
  padding: 24px;
  color: #333;
}

.header {
  text-align: center;
  margin-bottom: 24px;
}

.logo {
  width: 60px;
  margin-bottom: 8px;
  opacity: 0.9;
}

h2 {
  font-size: 18px;
  font-weight: 500;
  color: #444;
}

.card {
  background: #fff;
  padding: 24px;
  border-radius: 16px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

label {
  font-size: 13px;
  color: #777;
}

input, select {
  width: 100%;
  padding: 10px 12px;
  margin-top: 4px;
  margin-bottom: 14px;
  border: 1px solid #e6e6e6;
  border-radius: 10px;
  font-size: 14px;
  background: #fafafa;
  outline: none;
  transition: 0.2s;
}

input:focus, select:focus {
  border-color: #4a90e2;
  background: #fff;
}

button {
  width: 100%;
  padding: 12px;
  background: #4a90e2;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #3b7dd8;
}

button:active {
  transform: scale(0.98);
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h2>(주)엔케이 차량 운행 관리 시스템</h2>
</div>

<div class="card">

<form id="form">

  <label>구분</label><br>
  <select id="type">
    <option value="start">출발</option>
    <option value="end">도착</option>
  </select><br><br>

  <label>운행자</label><br>
  <input type="text" id="driver"><br><br>

  <label>목적지</label><br>
  <input type="text" id="destination"><br><br>

  <label>운행목적</label><br>
  <input type="text" id="purpose"><br><br>

  <label>계기판 km</label><br>
  <input type="number" id="km"><br><br>

  <label>주유량</label><br>
  <input type="number" id="fuel"><br><br>

  <label>주유금액</label><br>
  <input type="number" id="cost"><br><br>

  <button type="submit">저장</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://drbvrvftwryrglradshz.supabase.co";
const supabaseKey = "sb_publishable_hcsEKwfcnGHoWIOOAKarvA_G9xB3-Lc";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let lastData = null;

// 🔥 최근 진행중 운행 가져오기
async function getLastData() {

    const { data, error } = await client
        .from('car_log')
        .select('*')
        .is('end_km', null)
        .order('id', { ascending: false })
        .limit(1);

    if (error) {
        console.log(error);
        return;
    }

    lastData = (data && data.length > 0) ? data[0] : null;
}

// 🔥 도착 선택 시 자동 입력
document.getElementById("type").addEventListener("change", async function () {

    if (this.value === "end") {

        await getLastData();

        if (lastData) {
            document.getElementById("driver").value = lastData.driver || "";
            document.getElementById("destination").value = lastData.destination || "";
            document.getElementById("purpose").value = lastData.purpose || "";
        }

    } else {
        document.getElementById("form").reset();
    }
});

document.getElementById("form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const type = document.getElementById("type").value;
    const driver = document.getElementById("driver").value;
    const destination = document.getElementById("destination").value;
    const purpose = document.getElementById("purpose").value;

    const km = document.getElementById("km").value ? Number(document.getElementById("km").value) : null;
    const fuel = document.getElementById("fuel").value ? Number(document.getElementById("fuel").value) : null;
    const cost = document.getElementById("cost").value ? Number(document.getElementById("cost").value) : null;

    const now = new Date().toISOString();

    try {

        // 🔥 진행중 운행 조회
        const { data: lastRow } = await client
            .from('car_log')
            .select('*')
            .is('end_km', null)
            .order('id', { ascending: false })
            .limit(1);

        const last = (lastRow && lastRow.length > 0) ? lastRow[0] : null;

        // =========================
        // 🚗 출발
        // =========================
        if (type === "start") {

            await client
                .from('car_log')
                .insert([{
                    date: new Date().toISOString().split('T')[0],
                    driver,
                    destination,
                    purpose,
                    start_km: km,
                    start_time: now,
                    fuel,
                    cost
                }]);
        }

        // =========================
        // 🚗 도착
        // =========================
        if (type === "end") {

            if (!last) {
                alert("출발 기록이 없습니다.");
                return;
            }

            if (km === null) {
                alert("도착 km 입력 필요");
                return;
            }

            const distance = km - last.start_km;

            if (distance < 0) {
                alert("계기판 값 오류");
                return;
            }

            await client
                .from('car_log')
                .update({
                    driver,
                    destination,
                    purpose,
                    end_km: km,
                    end_time: now,
                    distance
                })
                .eq('id', last.id);
        }

        alert("저장 완료");
        document.getElementById("form").reset();

    } catch (err) {
        console.log(err);
        alert("오류 발생");
    }
});
</script>

</body>
</html>
