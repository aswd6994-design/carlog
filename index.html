<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" type="image/ico" sizes="128x128" href="favicon.ico">
<title>(주)NK 차량 운행 시스템</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: #f5f6f8;
  font-family: -apple-system, sans-serif;
}

.header {
  position: relative;
  text-align: center;
  padding: 16px 12px 8px;
}

.logo {
  width: 160px;
  max-width: 80%;
}

.history-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  padding: 6px 12px;
  font-size: 13px;
  border: none;
  border-radius: 8px;
  background: #4a90e2;
  color: white;
}

#warnIcon {
  position: fixed;
  top: 12px;
  left: 12px;
  font-size: 30px;
  cursor: pointer;
  z-index: 9999;
  display: none;
  color: red;
}

@keyframes softBlink {
  0%   { opacity: 1; transform: scale(1); }
  50%  { opacity: 0.4; transform: scale(1.1); }
  100% { opacity: 1; transform: scale(1); }
}

#warnIcon.blink {
  animation: softBlink 1.5s ease-in-out infinite;
}

#warnPopup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  padding: 16px;
  z-index: 10000;
}

.card {
  background: white;
  width: calc(100% - 24px);
  max-width: 420px;
  margin: 10px auto 30px;
  padding: 16px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

.mode-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.mode-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fafafa;
}

.mode-btn.active {
  background: #4a90e2;
  color: white;
  border: none;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 10px;
  border: 1px solid #e5e5e5;
  background: #fafafa;
  font-size: 16px;
}

button.save {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #4a90e2;
  color: white;
  font-size: 16px;
}

.header h2 {
  margin: 4px 0 0;
}

/* ===== 토스트 ===== */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 99999;
}

#toast.show {
  opacity: 1;
}
@keyframes warnBounce {
  0%   { transform: translate(-50%, -60%) scale(0.9); opacity:0; }
  50%  { transform: translate(-50%, -48%) scale(1.05); opacity:1; }
  70%  { transform: translate(-50%, -52%) scale(0.98); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

#warnPopup.show {
  animation: warnBounce 0.35s ease;
}

</style>

</head>

<body>

<div id="warnIcon" onclick="openWarnPopup()">⚠</div>

<div id="warnPopup">
  <h3>정비 알림</h3>
  <div id="warnContent"></div>

  <button onclick="goMaintenance()" style="width:100%;margin-top:12px;padding:10px;border:none;background:#4a90e2;color:#fff;border-radius:8px;">
    정비관리
  </button>

  <button onclick="closeWarnPopup()" style="width:100%;margin-top:8px;padding:10px;border:none;background:#ddd;border-radius:8px;">
    닫기
  </button>
</div>

<div class="header">
  <img src="logo.webp" class="logo">
  <button class="history-btn" onclick="location.href='history.html'">운행이력</button>
  <h2>(주)엔케이 차량 운행 시스템</h2>
</div>

<div class="card">

  <div class="mode-buttons">
    <button id="startBtn" class="mode-btn active">출발</button>
    <button id="endBtn" class="mode-btn">도착</button>
  </div>

  <form id="form">
    <input id="driver" placeholder="운행자">
    <input id="destination" placeholder="목적지">
    <input id="purpose" placeholder="목적">
    <input id="km" placeholder="계기판(km)" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <input id="fuel" placeholder="주유량" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <input id="cost" placeholder="금액" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <button class="save">저장</button>
  </form>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://drbvrvftwryrglradshz.supabase.co",
  "sb_publishable_hcsEKwfcnGHoWIOOAKarvA_G9xB3-Lc"
);

/* ===== 토스트 ===== */
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

const startBtn = document.getElementById("startBtn");
const endBtn = document.getElementById("endBtn");

let mode = "start";
let lastData = null;
let latestKm = 0;

const rule = {
  engine: 10000,
  tire: 50000,
  mission: 60000,
  air: 15000,
  fuel: 20000
};

let lastChange = {};

async function loadMaintenanceKm() {
  const { data } = await client.from('maintenance_log').select('part, km');

  let temp = {};
  (data || []).forEach(v => {
    const key = (v.part || "").toLowerCase();
    if (!temp[key] || v.km > temp[key]) {
      temp[key] = v.km;
    }
  });

  lastChange = temp;
}

async function loadLatestKm() {
  const { data } = await client
    .from('car_log')
    .select('end_km')
    .not('end_km', 'is', null)
    .order('id', { ascending: false })
    .limit(1);

  latestKm = data?.[0]?.end_km || 0;
  checkMaintenance();
}

function checkMaintenance() {
  let warn = [];
  let danger = [];

  for (let k in rule) {
    const last = lastChange[k] || 0;
    const diff = latestKm - last;

    if (diff >= rule[k]) danger.push(k);
    else if (diff >= rule[k] * 0.8) warn.push(k);
  }

  const icon = document.getElementById("warnIcon");

if (warn.length || danger.length) {
  icon.style.display = "block";
  icon.classList.add("blink"); // ✅ 깜박임 시작
} else {
  icon.style.display = "none";
  icon.classList.remove("blink"); // ✅ 깜박임 제거
}

  return { warn, danger };
}

function openWarnPopup() {
  const r = checkMaintenance();

  const name = {
    engine: "엔진오일",
    tire: "타이어",
    mission: "미션오일",
    air: "에어필터",
    fuel: "연료필터"
  };

  let html = "";

  if (r.danger.length) {
    html += "<b>교체 필요</b><br>";
    r.danger.forEach(v => html += "🔴 " + name[v] + "<br>");
  }

  if (r.warn.length) {
    html += "<br><b>곧 교체</b><br>";
    r.warn.forEach(v => html += "🟡 " + name[v] + "<br>");
  }

  document.getElementById("warnContent").innerHTML =
    html || "정비 필요 없음";

  const popup = document.getElementById("warnPopup");

// 애니메이션 초기화 (중요)
popup.classList.remove("show");
void popup.offsetWidth;

popup.style.display = "block";

// 애니메이션 실행
popup.classList.add("show");
  
}

function closeWarnPopup() {
  document.getElementById("warnPopup").style.display = "none";
}

function goMaintenance() {
  location.href = "maintenance.html";
}

/* ===== 추가된 부분 ===== */

// 바깥 클릭 시 닫기
window.addEventListener("click", function(e) {
  const popup = document.getElementById("warnPopup");

  if (popup.style.display === "block") {
    if (!popup.contains(e.target) && e.target.id !== "warnIcon") {
      closeWarnPopup();
    }
  }
});

// 페이지 복귀 시 닫기
window.addEventListener("pageshow", function() {
  closeWarnPopup();
});

/* ===== 기존 기능 ===== */

async function setStartDefaultKm() {
  const { data } = await client
    .from('car_log')
    .select('end_km')
    .not('end_km', 'is', null)
    .order('id', { ascending: false })
    .limit(1);

  const kmInput = document.getElementById("km");

  if (data?.[0]?.end_km) {
    kmInput.value = "";
    kmInput.placeholder = `이전 KM: ${data[0].end_km}`;
  }
}

startBtn.onclick = () => {
  mode = "start";
  startBtn.classList.add("active");
  endBtn.classList.remove("active");
  document.getElementById("form").reset();
  setStartDefaultKm();
};

endBtn.onclick = async () => {
  mode = "end";
  endBtn.classList.add("active");
  startBtn.classList.remove("active");

  const { data } = await client
    .from('car_log')
    .select('*')
    .is('end_km', null)
    .order('id', { ascending: false })
    .limit(1);

  lastData = data?.[0] || null;

  if (lastData) {
    driver.value = lastData.driver || "";
    destination.value = lastData.destination || "";
    purpose.value = lastData.purpose || "";

    document.getElementById("km").placeholder =
      `출발 KM: ${lastData.start_km}`;
  }
};

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!driver.value.trim()) {
    showToast("운행자를 입력하세요");
    return;
  }

  const inputKm = document.getElementById("km").value;
let km = 0;

if (inputKm === "" || inputKm === null) {
  // 입력 안했으면 → 마지막 END KM 사용
  km = latestKm;
} else {
  km = Number(inputKm);
}
  const now = new Date().toISOString();
  const date = new Date().toISOString().split('T')[0];

  if (mode === "start") {
    await client.from('car_log').insert([{
      date: date,
      driver: driver.value,
      destination: destination.value,
      purpose: purpose.value,
      start_km: km,
      start_time: now
    }]);
  }

  if (mode === "end" && lastData) {
    await client.from('car_log')
      .update({
        end_km: km,
        end_time: now,
        distance: km - lastData.start_km
      })
      .eq('id', lastData.id);
  }

  await loadMaintenanceKm();
  await loadLatestKm();

  showToast("저장되었습니다");
  document.getElementById("form").reset();
});

window.addEventListener("load", async () => {
  await setStartDefaultKm();
  await loadMaintenanceKm();
  await loadLatestKm();
});
</script>

</body>
</html>
