<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" type="image/ico" sizes="128x128" href="favicon.ico">
<title>(주)NK 차량 운행 시스템</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: #f5f6f8;
  font-family: -apple-system, sans-serif;
}

#warnIcon {
  color: red;
}

.header {
  position: relative;
  text-align: center;
  padding: 16px 12px 8px;
}

.logo {
  width: 160px;
  max-width: 80%;
}

.history-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  padding: 6px 12px;
  font-size: 13px;
  border: none;
  border-radius: 8px;
  background: #4a90e2;
  color: white;
}

/* ⚠ */
#warnIcon {
  position: fixed;
  top: 12px;
  left: 12px;
  font-size: 22px;
  cursor: pointer;
  z-index: 9999;
  display: none;
}

#warnPopup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  padding: 16px;
  z-index: 10000;
}

.card {
  background: white;
  width: calc(100% - 24px);
  max-width: 420px;
  margin: 10px auto 30px;
  padding: 16px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

.mode-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.mode-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fafafa;
}

.mode-btn.active {
  background: #4a90e2;
  color: white;
  border: none;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 10px;
  border: 1px solid #e5e5e5;
  background: #fafafa;
  font-size: 16px;
}

button.save {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #4a90e2;
  color: white;
  font-size: 16px;
}
</style>

</head>

<body>

<!-- ⚠ -->
<div id="warnIcon" onclick="openWarnPopup()">⚠</div>

<div id="warnPopup">
  <h3>정비 알림</h3>
  <div id="warnContent"></div>

  <button onclick="goMaintenance()" style="width:100%;margin-top:12px;padding:10px;border:none;background:#4a90e2;color:#fff;border-radius:8px;">
    정비관리
  </button>

  <button onclick="closeWarnPopup()" style="width:100%;margin-top:8px;padding:10px;border:none;background:#ddd;border-radius:8px;">
    닫기
  </button>
</div>

<div class="header">
  <img src="logo.webp" class="logo">
  <button class="history-btn" onclick="location.href='history.html'">운행이력</button>
  <h2>(주)엔케이 차량 운행 시스템</h2>
</div>

<div class="card">

  <div class="mode-buttons">
    <button id="startBtn" class="mode-btn active">출발</button>
    <button id="endBtn" class="mode-btn">도착</button>
  </div>

  <form id="form">
    <input id="driver" placeholder="운행자">
    <input id="destination" placeholder="목적지">
    <input id="purpose" placeholder="목적">
    <input id="km" placeholder="계기판(km)">
    <input id="fuel" placeholder="주유량">
    <input id="cost" placeholder="금액">
    <button class="save">저장</button>
  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://drbvrvftwryrglradshz.supabase.co",
  "sb_publishable_hcsEKwfcnGHoWIOOAKarvA_G9xB3-Lc"
);

let mode = "start";
let lastData = null;
let latestKm = 0;

/* ===== 정비 기준 ===== */
const rule = {
  engine: 10000,
  tire: 50000,
  mission: 60000,
  air: 15000,
  fuel: 20000
};

let lastChange = {
  engine: 0,
  tire: 0,
  mission: 0,
  air: 0,
  fuel: 0
};

/* ===== 출발 KM 기본값 ===== */
async function setStartDefaultKm() {
  const { data } = await client
    .from('car_log')
    .select('end_km')
    .not('end_km', 'is', null)
    .order('id', { ascending: false })
    .limit(1);

  const kmInput = document.getElementById("km");

  if (data?.[0]?.end_km) {
    kmInput.value = "";
    kmInput.placeholder = `이전 KM: ${data[0].end_km}`;
  }
}

/* ===== 최신 KM (정비용) ===== */
async function loadLatestKm() {
  const { data } = await client
    .from('car_log')
    .select('end_km')
    .not('end_km', 'is', null)
    .order('id', { ascending: false })
    .limit(1);

  latestKm = data?.[0]?.end_km || 0;
  checkMaintenance();
}

/* ===== 정비 계산 ===== */
function checkMaintenance() {
  let warn = [];
  let danger = [];

  for (let k in rule) {
    const diff = latestKm - lastChange[k];

    if (diff >= rule[k]) danger.push(k);
    else if (diff >= rule[k] * 0.8) warn.push(k);
  }

  document.getElementById("warnIcon").style.display =
    (warn.length || danger.length) ? "block" : "none";

  return { warn, danger };
}

/* ===== 팝업 ===== */
function openWarnPopup() {
  const r = checkMaintenance();

  const name = {
    engine: "엔진오일",
    tire: "타이어",
    mission: "미션오일",
    air: "에어필터",
    fuel: "연료필터"
  };

  let html = "";

  if (r.danger.length) {
    html += "<b>교체 필요</b><br>";
    r.danger.forEach(v => html += "🔴 " + name[v] + "<br>");
  }

  if (r.warn.length) {
    html += "<br><b>곧 교체</b><br>";
    r.warn.forEach(v => html += "🟡 " + name[v] + "<br>");
  }

  document.getElementById("warnContent").innerHTML =
    html || "정비 필요 없음";

  document.getElementById("warnPopup").style.display = "block";
}

function closeWarnPopup() {
  document.getElementById("warnPopup").style.display = "none";
}

function goMaintenance() {
  location.href = "maintenance.html";
}

/* ===== 버튼 복구 (핵심) ===== */
document.getElementById("startBtn").onclick = () => {
  mode = "start";
  startBtn.classList.add("active");
  endBtn.classList.remove("active");

  document.getElementById("form").reset();
  setStartDefaultKm();
};

document.getElementById("endBtn").onclick = async () => {
  mode = "end";
  endBtn.classList.add("active");
  startBtn.classList.remove("active");

  const { data } = await client
    .from('car_log')
    .select('*')
    .is('end_km', null)
    .order('id', { ascending: false })
    .limit(1);

  lastData = data?.[0] || null;

  // 🔥 UI 복구 (중요)
  if (lastData) {
    document.getElementById("driver").value = lastData.driver || "";
    document.getElementById("destination").value = lastData.destination || "";
    document.getElementById("purpose").value = lastData.purpose || "";

    const kmInput = document.getElementById("km");
    kmInput.value = "";
    kmInput.placeholder = `출발 KM: ${lastData.start_km}`;
  }
};

/* ===== 저장 ===== */
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const km = Number(document.getElementById("km").value || 0);
  const now = new Date().toISOString();

  if (mode === "start") {
    await client.from('car_log').insert([{
      date: new Date().toISOString().split('T')[0], // 🔥 이거 추가
      driver: driver.value,
      destination: destination.value,
      purpose: purpose.value,
      start_km: km,
      start_time: now
    }]);
  }

  if (mode === "end" && lastData) {
    await client.from('car_log')
      .update({
        end_km: km,
        end_time: now,
        distance: km - lastData.start_km
      })
      .eq('id', lastData.id);
  }

  await setStartDefaultKm();
  await loadLatestKm();

  alert("완료");
  document.getElementById("form").reset();
});

/* ===== 초기 실행 ===== */
window.addEventListener("load", async () => {
  await setStartDefaultKm();
  await loadLatestKm();
});
</script>

</body>
</html>
